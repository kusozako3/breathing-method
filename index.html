<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="呼吸法をサポートするガイドアプリ。吸う・止める・吐く・待つをリズムよく実践できます。">
  <title>呼吸ガイド</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       リセット & 基本スタイル
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* カラーパレット */
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.8);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-blue-bright: #60a5fa;
      --accent-blue-dim: #1e3a5f;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --border-color: rgba(148, 163, 184, 0.15);
      --border-active: rgba(59, 130, 246, 0.5);

      /* サイズ */
      --circle-size: min(65vw, 280px);
      --font-sm: 0.8rem;
      --font-md: 0.95rem;
      --font-lg: 1.2rem;
      --font-xl: 1.6rem;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow-y: auto;
    }

    /* ============================================
       レイアウトコンテナ
       ============================================ */
    .app-container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 20px 24px;
      gap: 18px;
      min-height: 100dvh;
    }

    /* ============================================
       ヘッダー
       ============================================ */
    .app-header {
      text-align: center;
      width: 100%;
    }

    .app-header h1 {
      font-size: var(--font-xl);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue-bright), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }

    .app-header p {
      font-size: var(--font-sm);
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ============================================
       呼吸法選択エリア
       ============================================ */
    .preset-selector {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .preset-btn {
      flex: 1;
      padding: 10px 8px;
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: var(--font-sm);
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .preset-btn.active {
      border-color: var(--accent-blue);
      color: var(--accent-blue-bright);
      background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.15);
    }

    .preset-btn:hover {
      border-color: var(--border-active);
    }

    /* ============================================
       カスタム設定パネル
       ============================================ */
    .custom-panel {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 14px 16px;
      backdrop-filter: blur(8px);
      display: none; /* JSで制御 */
    }

    .custom-panel.visible {
      display: block;
      animation: fadeSlideIn 0.3s ease;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .custom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .custom-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .custom-field label {
      font-size: var(--font-sm);
      color: var(--text-muted);
      font-weight: 400;
    }

    .custom-field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--font-md);
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .custom-field input:focus {
      border-color: var(--accent-blue);
    }

    /* ============================================
       円アニメーションエリア
       ============================================ */
    .circle-area {
      position: relative;
      width: var(--circle-size);
      height: var(--circle-size);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* 外側のリング（固定） */
    .circle-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(59, 130, 246, 0.2);
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.05);
    }

    /* 内側の塗り円（アニメーション対象） */
    .circle-inner {
      position: absolute;
      width: 0%;
      height: 0%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-blue-bright) 0%, var(--accent-blue) 60%, var(--accent-blue-dim) 100%);
      transition: none;
      opacity: 0;
    }

    /* グロー効果 */
    .circle-glow {
      position: absolute;
      width: 110%;
      height: 110%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .circle-glow.active {
      opacity: 1;
    }

    /* テキスト表示 */
    .circle-text {
      position: relative;
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }

    .circle-text .phase-label {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      letter-spacing: 0.08em;
    }

    .circle-text .timer-label {
      font-size: var(--font-md);
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      font-weight: 300;
    }

    /* アイドル状態のパルスアニメーション */
    @keyframes idlePulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50%      { transform: scale(1.05); opacity: 0.5; }
    }

    .circle-outer.idle {
      animation: idlePulse 3s ease-in-out infinite;
    }

    /* ============================================
       サイクルカウンター
       ============================================ */
    .cycle-counter {
      font-size: var(--font-sm);
      color: var(--text-muted);
      text-align: center;
    }

    .cycle-counter span {
      color: var(--accent-blue-bright);
      font-weight: 700;
      font-size: var(--font-md);
    }

    /* ============================================
       コントロールボタン
       ============================================ */
    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn-main {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-start {
      background: linear-gradient(135deg, var(--accent-blue), #6366f1);
      color: #fff;
      box-shadow: 0 4px 24px rgba(59, 130, 246, 0.4);
    }

    .btn-start:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 32px rgba(59, 130, 246, 0.55);
    }

    .btn-start:active {
      transform: scale(0.97);
    }

    .btn-stop {
      background: linear-gradient(135deg, var(--accent-red), #dc2626);
      color: #fff;
      box-shadow: 0 4px 24px rgba(239, 68, 68, 0.35);
    }

    .btn-stop:hover {
      transform: scale(1.07);
    }

    .btn-stop:active {
      transform: scale(0.97);
    }

    /* ボタンアイコン（SVG） */
    .btn-icon {
      width: 28px;
      height: 28px;
      fill: currentColor;
      pointer-events: none; /* スマホでのSVGタップによるイベント未発火を防止 */
    }

    /* ============================================
       現在の設定表示
       ============================================ */
    .current-settings {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .setting-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .setting-badge .badge-val {
      color: var(--accent-blue-bright);
      font-weight: 700;
    }

    /* ============================================
       音声トグル
       ============================================ */
    .sound-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }

    .sound-toggle:hover {
      border-color: var(--border-active);
      color: var(--accent-blue-bright);
    }

    .sound-toggle.muted {
      color: var(--text-muted);
    }

    /* ============================================
       レスポンシブ微調整
       ============================================ */
    @media (max-height: 640px) {
      :root {
        --circle-size: min(50vw, 220px);
      }
      .app-container {
        gap: 10px;
        padding: 10px 16px 16px;
      }
      .app-header h1 { font-size: 1.3rem; }
    }

    @media (min-width: 500px) {
      :root {
        --circle-size: 300px;
      }
    }

    /* ============================================
       スクロールバー非表示（モバイル向け）
       ============================================ */
    body::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <!-- モバイルでのタッチイベント反応を改善するため ontouchstart を追加 -->
  <div style="display:none;" ontouchstart=""></div>  <!-- 音声ミュートボタン -->
  <button id="soundToggle" class="sound-toggle" aria-label="音声ON/OFF">🔔</button>

  <div class="app-container">

    <!-- ヘッダー -->
    <header class="app-header">
      <h1>呼吸ガイド</h1>
      <p>リラックスして、呼吸に集中しましょう</p>
    </header>

    <!-- プリセット選択 -->
    <div class="preset-selector">
      <button class="preset-btn active" data-preset="478" id="preset478">
        4-7-8 呼吸
      </button>
      <button class="preset-btn" data-preset="box" id="presetBox">
        ボックス呼吸
      </button>
      <button class="preset-btn" data-preset="custom" id="presetCustom">
        カスタム
      </button>
    </div>

    <!-- カスタム設定パネル -->
    <div class="custom-panel" id="customPanel">
      <div class="custom-grid">
        <div class="custom-field">
          <label for="inputInhale">吸う (秒)</label>
          <input type="number" id="inputInhale" min="0" max="30" value="4">
        </div>
        <div class="custom-field">
          <label for="inputHold">ホールド (秒)</label>
          <input type="number" id="inputHold" min="0" max="30" value="4">
        </div>
        <div class="custom-field">
          <label for="inputExhale">吐く (秒)</label>
          <input type="number" id="inputExhale" min="0" max="30" value="4">
        </div>
        <div class="custom-field">
          <label for="inputWait">ウェイト (秒)</label>
          <input type="number" id="inputWait" min="0" max="30" value="4">
        </div>
      </div>
    </div>

    <!-- 現在の設定バッジ -->
    <div class="current-settings" id="currentSettings">
      <div class="setting-badge">吸 <span class="badge-val" id="badgeInhale">4</span>s</div>
      <div class="setting-badge">止 <span class="badge-val" id="badgeHold">7</span>s</div>
      <div class="setting-badge">吐 <span class="badge-val" id="badgeExhale">8</span>s</div>
      <div class="setting-badge">待 <span class="badge-val" id="badgeWait">0</span>s</div>
    </div>

    <!-- 円アニメーション -->
    <div class="circle-area" id="circleArea">
      <div class="circle-outer idle" id="circleOuter"></div>
      <div class="circle-inner" id="circleInner"></div>
      <div class="circle-glow" id="circleGlow"></div>
      <div class="circle-text">
        <div class="phase-label" id="phaseLabel">準備完了</div>
        <div class="timer-label" id="timerLabel"></div>
      </div>
    </div>

    <!-- サイクルカウンター -->
    <div class="cycle-counter" id="cycleCounter">
      サイクル: <span id="cycleCount">0</span>
    </div>

    <!-- コントロールボタン -->
    <div class="controls">
      <button class="btn-main btn-start" id="btnStart" aria-label="開始">
        <!-- 再生アイコン -->
        <svg class="btn-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
    </div>

  </div>

  <script>
    /* ====================================================================
       呼吸ガイドアプリ - メインスクリプト
       ==================================================================== */

    // ============================================
    // DOM要素の取得
    // ============================================
    const $ = (id) => document.getElementById(id);
    const circleOuter  = $('circleOuter');
    const circleInner  = $('circleInner');
    const circleGlow   = $('circleGlow');
    const phaseLabel   = $('phaseLabel');
    const timerLabel   = $('timerLabel');
    const btnStart     = $('btnStart');
    const cycleCountEl = $('cycleCount');
    const soundToggle  = $('soundToggle');
    const customPanel  = $('customPanel');

    // バッジ要素
    const badgeInhale = $('badgeInhale');
    const badgeHold   = $('badgeHold');
    const badgeExhale = $('badgeExhale');
    const badgeWait   = $('badgeWait');

    // カスタム入力要素
    const inputInhale = $('inputInhale');
    const inputHold   = $('inputHold');
    const inputExhale = $('inputExhale');
    const inputWait   = $('inputWait');

    // ============================================
    // プリセット定義
    // ============================================
    const PRESETS = {
      '478': { inhale: 4, hold: 7, exhale: 8, wait: 0 },
      'box': { inhale: 4, hold: 4, exhale: 4, wait: 4 },
    };

    // ============================================
    // 呼吸フェーズ定義
    // ============================================
    const PHASES = [
      { key: 'inhale', label: '吸って',  soundType: 'A' },
      { key: 'hold',   label: '止めて',  soundType: 'B' },
      { key: 'exhale', label: '吐いて',  soundType: 'C' },
      { key: 'wait',   label: '止めて',  soundType: 'B' },
    ];

    // ============================================
    // アプリケーション状態
    // ============================================
    let state = {
      running: false,          // 実行中フラグ
      currentPreset: '478',    // 現在のプリセット
      settings: { ...PRESETS['478'] }, // 現在の設定（実行時反映用）
      pendingSettings: null,   // 次サイクルで適用する設定
      phaseIndex: 0,           // 現在のフェーズインデックス
      phaseStartTime: 0,       // フェーズ開始時刻
      phaseDuration: 0,        // フェーズの長さ（ミリ秒）
      cycleCount: 0,           // 完了サイクル数
      animFrameId: null,       // requestAnimationFrame ID
      soundEnabled: true,      // 音声ON/OFF
    };

    // ============================================
    // Web Audio API - 音声生成
    // AudioContextを利用してプログラムで音を生成する
    // 外部音声ファイル不要で遅延が少ない
    // ============================================
    let audioCtx = null;

    /**
     * AudioContextを初期化する
     * ユーザー操作に応じて1度だけ呼ぶ
     */
    function initAudio() {
      try {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          
          audioCtx = new AudioContext();
          
          // モバイル向けに無音を再生してAudioContextを完全にアンロックする
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
          try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(0);
            osc.stop(0.01);
          } catch(e) {}
        } else if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } catch (err) {
        console.warn('Audio initialization failed:', err);
      }
    }

    /**
     * 音を再生する
     * @param {'A'|'B'|'C'} type - 音の種類
     *   A: 吸う（上昇トーン）
     *   B: ホールド/ウェイト（穏やかなトーン）
     *   C: 吐く（下降トーン）
     */
    function playSound(type) {
      if (!state.soundEnabled || !audioCtx) return;

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        switch (type) {
          case 'A': // 吸う - 上昇するサイン波
            osc.type = 'sine';
            osc.frequency.setValueAtTime(330, now);
            osc.frequency.linearRampToValueAtTime(520, now + 0.25);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
            break;

          case 'B': // ホールド/ウェイト - 穏やかなトーン
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
            break;

          case 'C': // 吐く - 下降するサイン波
            osc.type = 'sine';
            osc.frequency.setValueAtTime(520, now);
            osc.frequency.linearRampToValueAtTime(260, now + 0.35);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc.start(now);
            osc.stop(now + 0.45);
            break;
        }
      } catch (e) {
        // 音声再生エラーは無視（アプリ動作に影響させない）
        console.warn('音声再生エラー:', e);
      }
    }

    // ============================================
    // localStorage 保存・復元
    // ============================================
    const STORAGE_KEY = 'breathGuideSettings';

    /**
     * 設定をlocalStorageに保存する
     */
    function saveSettings() {
      try {
        const data = {
          preset: state.currentPreset,
          custom: {
            inhale: parseInt(inputInhale.value) || 4,
            hold:   parseInt(inputHold.value) || 0,
            exhale: parseInt(inputExhale.value) || 4,
            wait:   parseInt(inputWait.value) || 0,
          },
          soundEnabled: state.soundEnabled,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.warn('設定の保存に失敗:', e);
      }
    }

    /**
     * localStorageから設定を復元する
     */
    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);

        // プリセット復元
        if (data.preset) {
          state.currentPreset = data.preset;
        }

        // カスタム入力値復元
        if (data.custom) {
          inputInhale.value = data.custom.inhale !== undefined ? data.custom.inhale : 4;
          inputHold.value   = data.custom.hold !== undefined ? data.custom.hold : 0;
          inputExhale.value = data.custom.exhale !== undefined ? data.custom.exhale : 4;
          inputWait.value   = data.custom.wait !== undefined ? data.custom.wait : 0;
        }

        // 音声設定復元
        if (data.soundEnabled !== undefined) {
          state.soundEnabled = data.soundEnabled;
        }
      } catch (e) {
        console.warn('設定の読み込みに失敗:', e);
      }
    }

    // ============================================
    // 設定の取得・反映
    // ============================================

    /**
     * 現在の選択に基づいた設定値を取得する
     * @returns {{ inhale: number, hold: number, exhale: number, wait: number }}
     */
    function getCurrentConfig() {
      if (state.currentPreset === 'custom') {
        return {
          inhale: Math.max(0, parseInt(inputInhale.value) || 0),
          hold:   Math.max(0, parseInt(inputHold.value) || 0),
          exhale: Math.max(0, parseInt(inputExhale.value) || 0),
          wait:   Math.max(0, parseInt(inputWait.value) || 0),
        };
      }
      return { ...PRESETS[state.currentPreset] };
    }

    /**
     * 設定バッジのUIを更新する
     */
    function updateBadges() {
      const cfg = getCurrentConfig();
      badgeInhale.textContent = cfg.inhale;
      badgeHold.textContent   = cfg.hold;
      badgeExhale.textContent = cfg.exhale;
      badgeWait.textContent   = cfg.wait;
    }

    /**
     * プリセットボタンのアクティブ状態を更新する
     */
    function updatePresetButtons() {
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.preset === state.currentPreset);
      });
      // カスタムパネルの表示切替
      customPanel.classList.toggle('visible', state.currentPreset === 'custom');
    }

    // ============================================
    // 円アニメーション制御
    // ============================================

    /**
     * 円の内側を指定された割合で描画する
     * @param {number} ratio - 0〜1の割合（0=完全に縮小、1=完全に拡大）
     * @param {string} phase - 現在のフェーズキー
     */
    function updateCircle(ratio, phase) {
      const pct = ratio * 92; // 最大92%（余白を残す）

      switch (phase) {
        case 'inhale': {
          // 吸う: 青色が外側に広がる
          circleInner.style.width  = pct + '%';
          circleInner.style.height = pct + '%';
          circleInner.style.opacity = '1';
          circleInner.style.background = `radial-gradient(circle, 
            hsl(217, 91%, 65%) 0%, 
            hsl(217, 80%, 50%) 60%, 
            hsl(217, 65%, 30%) 100%)`;
          break;
        }

        case 'hold': {
          // ホールド: 鮮やかな青 → 濁った青に変化
          circleInner.style.width  = 92 + '%';
          circleInner.style.height = 92 + '%';
          circleInner.style.opacity = '1';
          // ratioが0→1で進行。彩度と明度を下げる
          const sat = 91 - ratio * 40;   // 91% → 51%
          const lit = 65 - ratio * 20;   // 65% → 45%
          circleInner.style.background = `radial-gradient(circle, 
            hsl(217, ${sat}%, ${lit}%) 0%, 
            hsl(217, ${sat - 10}%, ${lit - 10}%) 60%, 
            hsl(217, ${sat - 25}%, ${lit - 20}%) 100%)`;
          break;
        }

        case 'exhale': {
          // 吐く: 円が縮小する
          const shrink = (1 - ratio) * 92;
          circleInner.style.width  = shrink + '%';
          circleInner.style.height = shrink + '%';
          circleInner.style.opacity = 1 - ratio * 0.3;
          circleInner.style.background = `radial-gradient(circle, 
            hsl(217, 51%, 45%) 0%, 
            hsl(217, 41%, 35%) 60%, 
            hsl(217, 26%, 25%) 100%)`;
          break;
        }

        case 'wait': {
          // ウェイト: 透明にする
          circleInner.style.width  = '0%';
          circleInner.style.height = '0%';
          circleInner.style.opacity = '0';
          break;
        }
      }
    }

    /**
     * 円をリセット状態にする
     */
    function resetCircle() {
      circleInner.style.width   = '0%';
      circleInner.style.height  = '0%';
      circleInner.style.opacity = '0';
      circleGlow.classList.remove('active');
      circleOuter.classList.add('idle');
    }

    // ============================================
    // メインアニメーションループ
    // ============================================

    /**
     * フェーズを開始する
     * @param {number} index - フェーズインデックス (0-3)
     */
    function startPhase(index) {
      // サイクル先頭(index=0)で保留設定を適用
      if (index === 0 && state.pendingSettings) {
        state.settings = { ...state.pendingSettings };
        state.pendingSettings = null;
        updateBadges();
      }

      // 全フェーズが0秒の場合の無限再帰防止
      const totalDuration = state.settings.inhale + state.settings.hold
                          + state.settings.exhale + state.settings.wait;
      if (totalDuration === 0) {
        stop();
        return;
      }

      const phase = PHASES[index];
      const durationKey = phase.key === 'wait' ? 'wait' :
                          phase.key === 'inhale' ? 'inhale' :
                          phase.key === 'hold' ? 'hold' : 'exhale';
      const duration = state.settings[durationKey];

      // duration が 0 の場合はスキップ
      if (duration === 0) {
        // phaseIndexを更新してからadvancePhaseを呼ぶ
        state.phaseIndex = index;
        advancePhase();
        return;
      }

      state.phaseIndex = index;
      state.phaseDuration = duration * 1000;
      state.phaseStartTime = Date.now();

      // テキスト更新
      phaseLabel.textContent = phase.label;

      // 音声再生
      playSound(phase.soundType);

      // グロー効果
      circleGlow.classList.toggle('active', phase.key === 'inhale' || phase.key === 'hold');

      // アニメーションループ開始
      tick();
    }

    /**
     * 毎フレームの更新処理
     */
    function tick() {
      if (!state.running) return;

      const elapsed = Date.now() - state.phaseStartTime;
      const ratio = Math.min(elapsed / state.phaseDuration, 1);

      // 円アニメーション更新
      const phase = PHASES[state.phaseIndex];
      updateCircle(ratio, phase.key);

      // タイマーラベル更新（残り秒数を表示）
      const remaining = Math.ceil((state.phaseDuration - elapsed) / 1000);
      timerLabel.textContent = remaining > 0 ? remaining + ' 秒' : '';

      if (ratio >= 1) {
        // フェーズ完了 → 次フェーズへ
        advancePhase();
      } else {
        const rAF = window.requestAnimationFrame || window.webkitRequestAnimationFrame || (cb => setTimeout(cb, 16));
        state.animFrameId = rAF(tick);
      }
    }

    /**
     * 次のフェーズに進む
     */
    function advancePhase() {
      const nextIndex = (state.phaseIndex + 1) % 4;

      // 1サイクル完了時（waitの次 = inhale）
      if (nextIndex === 0) {
        state.cycleCount++;
        cycleCountEl.textContent = state.cycleCount;
      }

      startPhase(nextIndex);
    }

    // ============================================
    // 開始・停止制御
    // ============================================

    /**
     * 呼吸ガイドを開始する
     */
    function start() {
      initAudio();
      state.running = true;
      state.phaseIndex = 0;
      state.cycleCount = 0;
      cycleCountEl.textContent = '0';
      state.settings = getCurrentConfig();
      state.pendingSettings = null;

      // UIの切り替え
      circleOuter.classList.remove('idle');
      btnStart.innerHTML = `<svg class="btn-icon" viewBox="0 0 24 24"><rect x="5" y="3" width="5" height="18" rx="1"/><rect x="14" y="3" width="5" height="18" rx="1"/></svg>`;
      btnStart.classList.remove('btn-start');
      btnStart.classList.add('btn-stop');
      btnStart.setAttribute('aria-label', '停止');

      startPhase(0);
    }

    /**
     * 呼吸ガイドを停止してリセットする
     */
    function stop() {
      state.running = false;
      state.pendingSettings = null;

      // アニメーション停止
      if (state.animFrameId) {
        const cAF = window.cancelAnimationFrame || window.webkitCancelAnimationFrame || clearTimeout;
        cAF(state.animFrameId);
        state.animFrameId = null;
      }

      // UI リセット
      phaseLabel.textContent = '準備完了';
      timerLabel.textContent = '';
      resetCircle();

      btnStart.innerHTML = `<svg class="btn-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>`;
      btnStart.classList.remove('btn-stop');
      btnStart.classList.add('btn-start');
      btnStart.setAttribute('aria-label', '開始');
    }

    // ============================================
    // イベントリスナー
    // ============================================

    // 開始/停止ボタン
    btnStart.addEventListener('click', () => {
      if (state.running) {
        stop();
      } else {
        start();
      }
    });

    // プリセットボタン群
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.currentPreset = btn.dataset.preset;
        updatePresetButtons();
        updateBadges();
        saveSettings();

        // 実行中は次サイクルから反映するために保留設定をセット
        if (state.running) {
          state.pendingSettings = getCurrentConfig();
        }
      });
    });

    // カスタム入力値変更時
    [inputInhale, inputHold, inputExhale, inputWait].forEach(input => {
      input.addEventListener('change', () => {
        // 値のバリデーション： 0〜30の範囲にクランプ
        let val = parseInt(input.value);
        if (isNaN(val) || val < 0) val = 0;
        if (val > 30) val = 30;
        input.value = val;

        updateBadges();
        saveSettings();

        // 実行中は次サイクルから反映
        if (state.running) {
          state.pendingSettings = getCurrentConfig();
        }
      });
    });

    // 音声トグルボタン
    soundToggle.addEventListener('click', () => {
      state.soundEnabled = !state.soundEnabled;
      soundToggle.textContent = state.soundEnabled ? '🔔' : '🔕';
      soundToggle.classList.toggle('muted', !state.soundEnabled);
      saveSettings();
    });

    // ============================================
    // 初期化
    // ============================================
    (function init() {
      // 保存された設定を復元
      loadSettings();

      // UI反映
      updatePresetButtons();
      updateBadges();
      soundToggle.textContent = state.soundEnabled ? '🔔' : '🔕';
      soundToggle.classList.toggle('muted', !state.soundEnabled);
    })();
  </script>
</body>
</html>
